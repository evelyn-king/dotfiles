# Place a copy of this config to ~/.hyprspace.toml
# After that, you can edit ~/.hyprspace.toml to your liking

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# Start AeroSpace at login
start-at-login = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# The 'niri-focused-width-ratio' controls the width of the focused window
# in the scroll/niri/paper layout. Value must be between 0.1 and 1.0
# Examples:
#   0.8 (default) - 80% focused window, 10% peek on each side
#   0.6 - 60% focused window, 20% peek on each side
#   0.9 - 90% focused window, 5% peek on each side
#   1.0 - Full width (no peek effect)
niri-focused-width-ratio = 0.8

# ============================================================================
# DWINDLE LAYOUT: SINGLE WINDOW ASPECT RATIO (HyprSpace Exclusive Feature)
# ============================================================================
# When only ONE window is present in a dwindle workspace, enforce a specific
# aspect ratio to prevent uncomfortably wide/tall windows on ultrawide or
# vertical monitors. The window will be centered with padding on the sides.
#
# FORMAT: [width, height] where the ratio is width/height
#
# COMMON ASPECT RATIOS:
#   [16, 9]  - Standard widescreen (1920x1080, 2560x1440, 3840x2160)
#              Good for: General use, media, gaming
#
#   [16, 10] - Productivity ratio (1920x1200, 2560x1600)
#              Good for: Balance between code and media
#
#   [4, 3]   - Traditional/square (1024x768, 1600x1200)
#              Good for: Coding, terminals, documents, reading
#              More vertical space, less horizontal stretch
#
#   [21, 9]  - Ultrawide native (2560x1080, 3440x1440, 5120x2160)
#              Good for: Matching your ultrawide monitor's native ratio
#
#   [32, 9]  - Super ultrawide (3840x1080, 5120x1440)
#              Good for: Extreme ultrawide monitors
#
#   [3, 2]   - MacBook-style (3024x2016, 2880x1920)
#              Good for: Matching MacBook Pro aspect ratio
#
#   [0, 0]   - DISABLED (default)
#              Windows fill entire screen width (no padding)
#
# EXAMPLES - Uncomment and modify to enable:
# dwindle-single-window-aspect-ratio = [16, 9]   # Standard widescreen
# dwindle-single-window-aspect-ratio = [16, 10]  # Productivity
# dwindle-single-window-aspect-ratio = [4, 3]    # Traditional/square
dwindle-single-window-aspect-ratio = [21, 9] # Ultrawide
# dwindle-single-window-aspect-ratio = [0, 0]      # DISABLED (default)

# Tolerance threshold (0.0 to 1.0)
# Prevents tiny adjustments when monitor ratio is already close to requested.
# Higher values = less likely to apply padding.
#   0.0 - Always apply padding (even for tiny differences)
#   0.1 - Apply padding if it would be >10% of screen dimension (recommended)
#   0.2 - Apply padding if it would be >20% of screen dimension
dwindle-single-window-aspect-ratio-tolerance = 0.1

# IMPORTANT NOTES:
# - This feature ONLY works with the DWINDLE layout
# - Padding automatically appears when you have ONE window
# - Padding automatically disappears when you add a SECOND window
# - Does NOT affect tiles, accordion, scroll, or master layouts
# ============================================================================

# ============================================================================
# GOLDEN RATIO AND DEFAULT SPLIT SETTINGS
# ============================================================================

# Default split ratio for new dwindle containers (0.1 to 1.9)
# Controls how space is divided when dwindle creates new splits
#   1.0     - 50/50 split (equal halves) - DEFAULT
#   1.618   - Golden ratio (61.8% / 38.2% split)
#   0.618   - Inverse golden ratio (38.2% / 61.8% split)
#   1.5     - 60/40 split
#   0.667   - 40/60 split
# Note: balance-sizes command resets all ratios to this value
dwindle-default-split-ratio = 1.0 # Default (50/50)
# dwindle-default-split-ratio = 1.618    # Golden ratio (recommended for aesthetics)

# Default master area percentage for master layout (0.1 to 0.9)
# Controls how much width the master window takes vs the stack
#   0.5     - 50% master, 50% stack - DEFAULT
#   0.618   - Golden ratio (61.8% master, 38.2% stack)
#   0.382   - Inverse golden ratio (38.2% master, 61.8% stack)
#   0.6     - 60% master, 40% stack
#   0.667   - 66.7% master, 33.3% stack (2:1 ratio)
# Note: balance-sizes command resets master area to this value
master-default-percent = 0.5 # Default (50/50)
# master-default-percent = 0.618         # Golden ratio (recommended for productivity)

# Default layout for new workspaces
# Possible values: tiles | accordion | dwindle | scroll | master
#   tiles    - Traditional tiling with manual splits (i3-like) - DEFAULT
#   accordion - Tabbed/stacked layout, only most recent window visible
#   dwindle  - Binary tree auto-splits (Hyprland-inspired)
#   scroll   - Carousel layout (80% centered, 10% peek on each side)
#   master   - Master-stack layout (one large master, others in stack)
default-root-container-layout = 'dwindle'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
#                   sectionSign (ISO keyboards only, european keyboards only)
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with ctrl + enter shortcut
# (like in i3)
# ctrl-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
ctrl-slash = 'layout tiles horizontal vertical'
ctrl-comma = 'layout accordion horizontal vertical'
# Uncomment to enable dwindle and scroll layouts:
ctrl-period = 'layout dwindle'
# ctrl-shift-period = 'layout scroll'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
ctrl-h = 'focus left'
ctrl-j = 'focus down'
ctrl-k = 'focus up'
ctrl-l = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
ctrl-shift-h = 'move left'
ctrl-shift-j = 'move down'
ctrl-shift-k = 'move up'
ctrl-shift-l = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
ctrl-minus = 'resize smart -50'
ctrl-equal = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
ctrl-1 = 'workspace 1'
ctrl-2 = 'workspace 2'
ctrl-3 = 'workspace 3'
ctrl-4 = 'workspace 4'
ctrl-5 = 'workspace 5'
ctrl-6 = 'workspace 6'
ctrl-7 = 'workspace 7'
ctrl-8 = 'workspace 8'
ctrl-9 = 'workspace 9'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
ctrl-shift-1 = 'move-node-to-workspace 1'
ctrl-shift-2 = 'move-node-to-workspace 2'
ctrl-shift-3 = 'move-node-to-workspace 3'
ctrl-shift-4 = 'move-node-to-workspace 4'
ctrl-shift-5 = 'move-node-to-workspace 5'
ctrl-shift-6 = 'move-node-to-workspace 6'
ctrl-shift-7 = 'move-node-to-workspace 7'
ctrl-shift-8 = 'move-node-to-workspace 8'
ctrl-shift-9 = 'move-node-to-workspace 9'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
ctrl-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
ctrl-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = [
  'layout floating tiling',
  'mode main',
] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

# sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
#s = ['layout sticky tiling', 'mode main']

ctrl-shift-h = ['join-with left', 'mode main']
ctrl-shift-j = ['join-with down', 'mode main']
ctrl-shift-k = ['join-with up', 'mode main']
ctrl-shift-l = ['join-with right', 'mode main']
